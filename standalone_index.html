      // SIMULATION HANDLERS
      function simulateGeminiInsights(transactions, goals, budgets) {
        const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, c) => s + c.amount, 0);
        const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s, c) => s + c.amount, 0);
        const leftOver = totalIncome - totalExpense;
        const catSums = {};
        transactions.filter(t => t.type === 'expense').forEach(t => { catSums[t.category] = (catSums[t.category] || 0) + t.amount; });
        const sortedCats = Object.entries(catSums).sort((a,b)=>b[1]-a[1]);
        const mainExpenseCat = sortedCats[0] ? sortedCats[0][0] : "Lazer";
        const mainExpenseAmt = sortedCats[0] ? sortedCats[0][1] : 0;
        
        const overallAnalysis = `Análise de Saldo: Seu caixa mensal apresenta saldo líquido de R$ ${leftOver.toFixed(2)}. Seu maior canal de saídas corporativas ou de alimentação é a categoria ${mainExpenseCat} (R$ ${mainExpenseAmt.toFixed(2)} consumidos). `;
        const insights = [

        ];
        return { insights, overallAnalysis };
      }

      // 5. AUTOMATIONS, OPEN FINANCE & SHARED REPORT
      function FinanceAutomation({ rules, onAddRule, onDeleteRule, notifications, onMarkNotificationRead, groupExpenses, onAddGroupExpense, onClearGroupExpenses, isOffline, onToggleOffline, onOpenFinanceSyncDone }) {
        const [bankSync, setBankSync] = useState(null);
        const [syncLogs, setSyncLogs] = useState([]);
        const [step, setStep] = useState(0);

        const [rPattern, setRPattern] = useState("");
        const [rCat, setRCat] = useState("Alimentação");

        const [gDesc, setGDesc] = useState("");
        const [gAmt, setGAmt] = useState("");
        const [gPaid, setGPaid] = useState("Me (Andrey)");

        const members = ["Me (Andrey)", "Gabriel", "Letícia"], count = 3;
        const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        const handleSync = (bank) => {
          setBankSync(bank); setStep(1); setSyncLogs(["Conectando aos canais mTLS TLS 1.3 bancários..."]);
          setTimeout(() => {
            setSyncLogs(prev=>[...prev, `Buscando consentimento ativo na base BCB...`, `Lançamentos importados e filtrados. Sincronização conluída.`]);
            setStep(2);
            setTimeout(() => {
              onOpenFinanceSyncDone([
                { description: `Carga Open Finance ${bank}`, amount: 1500, type: 'income', category: 'Receita', subCategory: 'Investimentos', date: new Date().toISOString().split('T')[0], account: 'Conta Corrente', isFixed: false }
              ]);
              setBankSync(null); setStep(0); setSyncLogs([]);
            }, 1000);
          }, 1200);
        };

        const handleAddRuleSubmit = (e) => {
          e.preventDefault(); if (!rPattern) return;
          onAddRule({ pattern: rPattern, category: rCat, subCategory: "Geral" });
          setRPattern("");
        };

        const handleAddGroupSubmit = (e) => {
          e.preventDefault(); if (!gDesc || !gAmt) return;
          const map = {}; members.forEach(m => { map[m] = 33.3; });
          onAddGroupExpense({ description: gDesc, amount: parseFloat(gAmt), paidBy: gPaid, splits: map, date: new Date().toISOString().split('T')[0] });
          setGDesc(""); setGAmt("");
        };

        // Settlement Split: each member paid vs spent
        const paid = {}, spent = {};
        members.forEach(m=>{ paid[m]=0; spent[m]=0; });
        groupExpenses.forEach(x=>{
          paid[x.paidBy] += x.amount;
          const share = x.amount / count;
          members.forEach(m=>{ spent[m] += share; });
        });
        const balances = members.map(m=>({ name: m, net: paid[m] - spent[m] }));
        const settlements = [];
        const creditors = balances.filter(b=>b.net > 0.05).sort((a,b)=>b.net-a.net);
        const debtors = balances.filter(b=>b.net < -0.05).sort((a,b)=>a.net-b.net);
        let cIdx = 0, dIdx = 0;
        while(cIdx < creditors.length && dIdx < debtors.length) {
          const c = creditors[cIdx], d = debtors[dIdx];
          const amt = Math.min(c.net, Math.abs(d.net));
          settlements.push({ debtor: d.name, creditor: c.name, amount: amt });
          c.net -= amt; d.net += amt;
          if (c.net < 0.05) cIdx++;
          if (Math.abs(d.net) < 0.05) dIdx++;
        }

        return (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div className="lg:col-span-6 space-y-6">
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                <h3 className="text-lg font-bold flex items-center gap-1.5"><Icon name="RefreshCcw" className="text-blue-500" />Sincronização Open Finance</h3>
                <p className="text-xs text-slate-500">Conecte sua conta em canais criptografados para consolidar saldos:</p>
                <div className="grid grid-cols-2 gap-3">
                  {['Nubank', 'Itaú', 'XP Invest', 'Bradesco'].map(b=>(
                    <button key={b} onClick={()=>handleSync(b)} className="p-3 border border-slate-200 hover:border-blue-500 rounded-xl text-left hover:bg-blue-50/20 cursor-pointer">
                      <span className="font-bold text-slate-800 text-xs block">{b}</span>
                      <span className="text-[10px] text-slate-400">Handshake mTLS API</span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                <h4 className="text-sm font-bold flex items-center gap-1.5"><Icon name="Bell" />Avisos e Notificações</h4>
                <div className="space-y-2.5 max-h-[180px] overflow-y-auto">
                  {notifications.map(n=>(
                    <div key={n.id} className={`p-2.5 rounded-xl border text-xs flex gap-2 ${n.read ? 'bg-slate-50/50 border-slate-100 opacity-60' : 'bg-blue-50/45 border-blue-100'}`}>
                      <Icon name="AlertTriangle" className="text-rose-500 shrink-0 mt-0.5" />
                      <div className="flex-1 space-y-0.5">
                        <strong className="text-slate-800 block text-xs">{n.title}</strong>
                        <p className="text-[11px] text-slate-600">{n.message}</p>
                        {!n.read && <button onClick={()=>onMarkNotificationRead(n.id)} className="text-[9px] text-blue-600 font-bold hover:underline cursor-pointer">Marcar como Lido</button>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="lg:col-span-6 space-y-6">
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                <h4 className="text-sm font-bold flex items-center gap-1.5 text-emerald-600"><Icon name="Users" />Acerto de Contas Coletivo (Grupo)</h4>
                <div className="space-y-2 max-h-[160px] overflow-y-auto">
                  {groupExpenses.map(x=>(
                    <div key={x.id} className="p-2.5 bg-slate-50 border border-slate-150 rounded-xl text-xs flex justify-between font-sans">
                      <div><strong>{x.description}</strong><span className="text-[10px] text-slate-400 block">Pago por {x.paidBy} • Split em 3 membros</span></div>
                      <span className="font-mono font-bold text-slate-850">{fmt(x.amount)}</span>
                    </div>
                  ))}
                </div>
                {groupExpenses.length > 0 && (
                  <div className="p-3 bg-emerald-50 rounded-xl border border-emerald-100 text-xs space-y-1.5">
                    <span className="text-[10px] font-bold text-emerald-950 uppercase tracking-wide block">Transferências Necessárias para Zerar Saldos</span>
                    {settlements.map((s,i)=>(
                      <p key={i} className="text-slate-800">
                        <strong className="text-red-700">{s.debtor}</strong> deve transferir <strong className="font-mono text-blue-700">{fmt(s.amount)}</strong> para <strong className="text-emerald-800">{s.creditor}</strong>
                      </p>
                    ))}
                  </div>
                )}
                <form onSubmit={handleAddGroupSubmit} className="space-y-2.5 pt-2 border-t border-slate-50 text-xs">
                  <div className="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="Ex: Combustível Carro" value={gDesc} onChange={e=>setGDesc(e.target.value)} required className="p-2 border border-slate-200 rounded-lg" />
                    <input type="number" placeholder="Valor" value={gAmt} onChange={e=>setGAmt(e.target.value)} required className="p-2 border border-slate-200 rounded-lg font-mono" />
                  </div>
                  <button type="submit" className="w-full py-1.5 bg-slate-900 text-white font-bold rounded-lg cursor-pointer">Lançar no Grupo</button>
                </form>
              </div>
            </div>

            {/* OPEN FINANCE TRANSITION MODAL */}
            {bankSync && (
              <div className="fixed inset-0 z-50 bg-slate-950/45 backdrop-blur-xs flex items-center justify-center p-4">
                <div className="bg-slate-950 text-emerald-400 w-full max-w-sm rounded-2xl p-5 border border-slate-800 space-y-4 font-mono text-[11px]">

                <div className="space-y-2 text-xs font-sans">
                  {pieData.map((e,i)=>(

                      <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: COLORS[i % COLORS.length] }} /><span>{e.name}</span></div>

            <div className="lg:col-span-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">

              <div className="space-y-3 pt-1">

                  <div key={i} className="p-3.5 bg-blue-50/20 rounded-xl border border-blue-100 text-xs relative space-y-1">
                    <span className="absolute top-2.5 right-2 rounded text-[8px] bg-rose-50 text-rose-600 px-1 font-bold">RECOMENDADO</span>

                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

                <button onClick={()=>{ setBio(!bio); alert(bio ? 'Face ID e Digital inativos no Gestor.' : 'Face ID / Fingerprint integrado na cofre mestre!'); }} className={`p-1 w-11 h-6 rounded-full transition-colors relative cursor-pointer ${bio ? 'bg-emerald-500':'bg-slate-200'}`}>

                </button>
              </div>
            </div>

            <div className="lg:col-span-6 space-y-6">
              <div className="bg-white p-6 rounded-2xl border border-slate-250 shadow-sm space-y-4">
                <h4 className="text-sm font-bold flex items-center gap-1 text-slate-900"><Icon name="ShieldCheck" className="text-blue-600" />Criptografia Local & Privacidade</h4>
                <div className="space-y-2 text-slate-600 leading-normal">
                  <p>Suas contas Open Finance, histórico de movimentações e carteiras de meta caixas são salvos criptografados na sandbox local do seu perfil de usuário.</p>
                  <div className="bg-slate-950 text-slate-300 p-3.5 rounded-2xl border border-slate-800 font-mono text-[9px] leading-relaxed">
                    <div className="flex justify-between font-bold border-b border-slate-800 pb-1 mb-1"><span>CHAVE DE PROTEÇÃO</span><span>ALGORITMO ATIVO</span></div>
                    <div className="flex justify-between"><span>Base de Lançamentos</span><span className="text-emerald-400 font-bold">AES-256 Chave Móvel</span></div>
                    <div className="flex justify-between"><span>Handshake Consentimento</span><span className="text-emerald-400 font-bold">mTLS RSA 4096 SHA256</span></div>
                  </div>
                </div>
              </div>

              <div className="bg-rose-50 border border-rose-100 p-6 rounded-2xl space-y-3 text-xs">
                <h4 className="text-sm font-bold text-rose-950 flex items-center gap-1.5"><Icon name="ShieldAlert" className="text-rose-600 shrink-0" />Zona de Wipe / Apagar Tudo</h4>
                <p className="text-rose-800">Esta ação elimina toda a persistência de cookies local na sandbox de desenvolvimento e redefine o Gestor para as movimentações de fábrica de Andrey Salgueiro.</p>
                <button onClick={()=>{ if(confirm("Confirma Wiping definitivo? Isso redefinirá todos os seus lançamentos locais para o estado de fábrica.")) { onClearAllData(); alert("Persistência limpada! Recarregando..."); window.location.reload(); } }} className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl cursor-pointer shadow-sm block text-center">Wiping de Dados Fábrica</button>

      // MAIN APP ENTRYPOINT
      function App() {
        const [activeTab, setActiveTab] = useState('dashboard');
        const [isSidebarOpen, setIsSidebarOpen] = useState(false);

        const [transactions, setTransactions] = useState(() => {
          const s = localStorage.getItem("fin_transactions");
          return s ? JSON.parse(s) : INITIAL_TRANSACTIONS;
        });
        const [goals, setGoals] = useState(() => {
          const s = localStorage.getItem("fin_goals");
          return s ? JSON.parse(s) : INITIAL_GOALS;
        });
        const [budgets, setBudgets] = useState(() => {
          const s = localStorage.getItem("fin_budgets");
          return s ? JSON.parse(s) : INITIAL_BUDGETS;
        });
        const [creditCards, setCreditCards] = useState(() => {
          const s = localStorage.getItem("fin_credit_cards");
          return s ? JSON.parse(s) : INITIAL_CREDIT_CARDS;
        });
        const [bills, setBills] = useState(() => {
          const s = localStorage.getItem("fin_bills");
          return s ? JSON.parse(s) : INITIAL_BILLS;
        });
        const [rules, setRules] = useState(() => {
          const s = localStorage.getItem("fin_rules");
          return s ? JSON.parse(s) : INITIAL_RULES;
        });
        const [notifications, setNotifications] = useState(() => {
          const s = localStorage.getItem("fin_notifications");
          return s ? JSON.parse(s) : INITIAL_NOTIFICATIONS;
        });
        const [groupExpenses, setGroupExpenses] = useState(() => {
          const s = localStorage.getItem("fin_group_expenses");
          return s ? JSON.parse(s) : INITIAL_GROUP_EXPENSES;
        });
        const [isOffline, setIsOffline] = useState(() => {
          const s = localStorage.getItem("fin_is_offline");
          return s ? JSON.parse(s) === "true" : false;
        });

        const [isLocked, setIsLocked] = useState(true);
        const [pinCode, setPinCode] = useState("");
        const [biometricsLoading, setBiometricsLoading] = useState(false);
        const [isSyncing, setIsSyncing] = useState(false);

        const [accountsBalances, setAccountsBalances] = useState({ corrente: 5410.50, poupanca: 12000.00, investimentos: 25400.00, dinheiro: 320.00 });

        // Storage Watchers
        useEffect(() => { localStorage.setItem("fin_transactions", JSON.stringify(transactions)); }, [transactions]);
        useEffect(() => { localStorage.setItem("fin_goals", JSON.stringify(goals)); }, [goals]);
        useEffect(() => { localStorage.setItem("fin_budgets", JSON.stringify(budgets)); }, [budgets]);
        useEffect(() => { localStorage.setItem("fin_is_offline", String(isOffline)); }, [isOffline]);
        useEffect(() => { localStorage.setItem("fin_notifications", JSON.stringify(notifications)); }, [notifications]);
        useEffect(() => { localStorage.setItem("fin_group_expenses", JSON.stringify(groupExpenses)); }, [groupExpenses]);

        // Balances recalculation watch
        useEffect(() => {
          let cc = 4200.00, pou = 12000.00, inv = 25400.00, cash = 320.00;
          transactions.forEach(t => {
            const multi = t.type === 'expense' ? -1 : 1;
            if (t.account === 'Conta Corrente') cc += (t.amount * multi);
            else if (t.account === 'Poupança') pou += (t.amount * multi);
            else if (t.account === 'Investimentos') inv += (t.amount * multi);
            else if (t.account === 'Dinheiro') cash += (t.amount * multi);
          });
          setAccountsBalances({ corrente: cc, poupanca: pou, investimentos: inv, dinheiro: cash });
        }, [transactions]);

        const triggerNotification = (title, msg, type) => {
          const alertNf = { id: `nf-${Date.now()}`, title, message: msg, type, date: new Date().toISOString().split('T')[0], read: false };
          setNotifications(prev => [alertNf, ...prev]);
        };

        const handleAddTransaction = (newTr) => {
          const full = { ...newTr, id: `t-${Date.now()}` };
          setTransactions(prev => [full, ...prev]);

          if (newTr.type === 'expense') {
            setBudgets(prev => prev.map(b => {
              if (b.category === newTr.category) {
                const updated = b.current + newTr.amount;
                if (updated >= b.limit * 0.8 && b.current < b.limit * 0.8) {
                  triggerNotification("Aviso de Orçamento", `Sua categoria ${b.category} atingiu 80% do limite de despesas.`, "alert");
                } else if (updated >= b.limit && b.current < b.limit) {
                  triggerNotification("Orçamento Estourado!", `Despesas na categoria ${b.category} atingiram 100% de ocupação!`, "alert");
                }
                return { ...b, current: updated };
              }
              return b;
            }));
          }
        };

        const handleDeleteTransaction = (id) => {
          const t = transactions.find(x => x.id === id);
          setTransactions(prev => prev.filter(x => x.id !== id));
          if (t && t.type === 'expense') {
            setBudgets(prev => prev.map(b => b.category === t.category ? { ...b, current: Math.max(0, b.current - t.amount) } : b));
          }
        };

        const handleDepositToGoal = (id, amt) => {
          setGoals(prev => prev.map(g => g.id === id ? { ...g, current: g.current + amt } : g));
          const goalName = goals.find(g => g.id === id)?.name || "Caixinha";
          handleAddTransaction({ description: `Aporte: Caixinha ${goalName}`, amount: amt, type: 'expense', category: 'Outros', subCategory: 'Aporte', date: new Date().toISOString().split('T')[0], account: 'Conta Corrente', isFixed: false });
        };

        const handleSyncOpenFinance = () => {
          setIsSyncing(true);
          setTimeout(() => {
            setIsSyncing(false);
            handleAddTransaction({ description: "Rendimento CDB Itaú Automático", amount: 85.00, type: 'income', category: 'Receita', subCategory: 'Investimentos', date: new Date().toISOString().split('T')[0], account: 'Conta Corrente', isFixed: false });
            triggerNotification("Transações Sincronizadas", "Handshake criptografado finalizado. Saldos atualizados com êxito.", "success");
          }, 1500);
        };

        const handleClearAll = () => { localStorage.clear(); };

        const handleBiometrics = () => {
          setBiometricsLoading(true);
          setTimeout(() => {
            setBiometricsLoading(false); setIsLocked(false);
            alert("Digital validada com sucesso! Bem-vindo de volta.");
          }, 1200);
        };

        return (
          <div className="min-h-screen bg-slate-50 flex text-slate-800 font-sans tracking-tight antialiased">
            
            {/* SIDEBAR NAVIGATION */}
            <aside className={`fixed inset-y-0 left-0 z-40 bg-slate-900 text-white w-64 p-6 border-r border-slate-800 flex flex-col justify-between transition-transform transform lg:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:static`}>
              <div className="space-y-6">
                <div className="flex items-center gap-3">
                  <div className="p-2.5 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-500/20"><Icon name="Wallet" className="w-5 h-5" /></div>
                  <div>
                    <h1 className="text-sm font-bold font-display tracking-wide uppercase">Gestor Finanças</h1>
                    <span className="text-[10px] text-slate-400 font-mono font-bold block mt-0.5">SANDBOX ACTIVE v4.2</span>
                  </div>
                </div>
                <nav className="space-y-1.5 pt-4">
                  <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-2 font-mono">Finanças Pessoais</span>
                  {[
                    { id: 'dashboard', name: 'Visão Geral', icon: 'Wallet' },
                    { id: 'transactions', name: 'Histórico & Lançamentos', icon: 'Layers' },
                    { id: 'planning', name: 'Metas e CDB', icon: 'PiggyBank' },
                    { id: 'debts', name: 'Cartões & Dívidas', icon: 'CreditCard' },
                    { id: 'automation', name: 'Open Finance & Grupo', icon: 'RefreshCcw' },
                    { id: 'reports', name: 'Relatórios Inteligência', icon: 'Sparkles' },
                    { id: 'security', name: 'Cofre mestre PIN', icon: 'Lock' }
                  ].map(tab=>(
                    <button key={tab.id} onClick={()=>{ setActiveTab(tab.id); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-semibold tracking-wide transition-colors cursor-pointer ${activeTab===tab.id?'bg-blue-600 text-white shadow-md':'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                      <Icon name={tab.icon} />
                      {tab.name}
                    </button>
                  ))}
                </nav>
              </div>
              <div className="p-3 bg-slate-850 rounded-xl flex items-center gap-2.5 text-xs">
                <div className="w-7 h-7 bg-slate-800 rounded-full flex items-center justify-center font-bold font-mono">AS</div>
                <div><strong className="block text-slate-200">Andrey Salgueiro</strong><span className="text-[10px] text-slate-500 font-mono">@andreysalgueiro95</span></div>
              </div>
            </aside>

            {/* WORKSPACE AREA */}
            <main className="flex-1 min-w-0 flex flex-col justify-between">
              <div>
                <header className="bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between sticky top-0 z-30">
                  <div className="flex items-center gap-3">
                    <button onClick={()=>setIsSidebarOpen(true)} className="p-2 bg-slate-50 border border-slate-100 rounded-xl lg:hidden"><Icon name="Menu" /></button>
                    <div className="flex items-center gap-1.5 text-xs">
                      <span className="text-slate-400 font-bold uppercase font-mono text-[10px]">Painel Ativo ❯</span>
                      <strong className="bg-slate-100 px-2 py-0.5 rounded text-slate-800 uppercase font-mono">{activeTab}</strong>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="hidden md:block text-xs font-medium text-slate-400">Saldo Corrente: <strong className="text-slate-800 font-mono">R$ {accountsBalances.corrente.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</strong></div>
                    <button onClick={()=>setIsLocked(true)} className="px-3 py-1.5 bg-slate-100 border border-slate-200 text-slate-700 hover:bg-slate-200 rounded-lg text-xs font-semibold flex items-center gap-1.5 cursor-pointer"><Icon name="Lock" />Bloquear Cofre</button>
                  </div>
                </header>

                <div className="p-6 max-w-7xl mx-auto w-full">
                  {activeTab === 'dashboard' && <FinanceDashboard transactions={transactions} accountsBalances={accountsBalances} onTriggerSync={handleSyncOpenFinance} isSyncing={isSyncing} isOffline={isOffline} />}
                  {activeTab === 'transactions' && <FinanceTransactions transactions={transactions} onAddTransaction={handleAddTransaction} onDeleteTransaction={handleDeleteTransaction} bills={bills} onToggleBillPause={id=>setBills(prev=>prev.map(b=>b.id===id?{...b,paused:!b.paused}:b))} onAddBill={b=>setBills(prev=>[...prev,{...b,id:`b-${Date.now()}`}])} budgets={budgets} onUpdateBudgetLimit={(cat,lim)=>setBudgets(prev=>prev.map(b=>b.category===cat?{...b,limit:lim}:b))} />}
                  {activeTab === 'planning' && <FinancePlanning goals={goals} onDepositToGoal={handleDepositToGoal} onAddGoal={g=>setGoals(prev=>[...prev,{...g,id:`g-${Date.now()}`}])} monthlyLeftOver={accountsBalances.corrente} />}
                  {activeTab === 'debts' && <FinanceCreditCards cards={creditCards} onUpdateLimitUsed={(id,amt)=>setCreditCards(prev=>prev.map(c=>c.id===id?{...c,limitUsed:amt}:c))} />}
                  {activeTab === 'automation' && <FinanceAutomation rules={rules} onAddRule={r=>setRules(prev=>[...prev,{...r,id:`r-${Date.now()}`}])} onDeleteRule={id=>setRules(prev=>prev.filter(r=>r.id!==id))} notifications={notifications} onMarkNotificationRead={id=>setNotifications(prev=>prev.map(n=>n.id===id?{...n,read:true}:n))} groupExpenses={groupExpenses} onAddGroupExpense={x=>setGroupExpenses(prev=>[...prev,{...x,id:`x-${Date.now()}`}])} onClearGroupExpenses={()=>setGroupExpenses([])} isOffline={isOffline} onToggleOffline={()=>setIsOffline(!isOffline)} onOpenFinanceSyncDone={handleAddTransaction} />}
                  {activeTab === 'reports' && <FinanceReports transactions={transactions} goals={goals} budgets={budgets} />}
                  {activeTab === 'security' && <FinanceSecurity onClearAllData={handleClearAll} isPinLocked={isLocked} onSetPinLocked={setIsLocked} />}
                </div>
              </div>
            </main>

            {/* SCREEN SHIELD LOCK OVERLAY */}
            {isLocked && (
              <div className="fixed inset-0 z-50 bg-[#020617ef] backdrop-blur-xl flex items-center justify-center p-4">
                <div className="bg-slate-900/60 w-full max-w-sm rounded-[24px] border border-white/10 p-6 text-center space-y-6 relative overflow-hidden text-white">
                  <div className="absolute -top-10 -right-10 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl" />

                    <div className="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mx-auto"><Icon name="Lock" className="w-7 h-7 text-blue-400" /></div>

                  </div>
                  <form onSubmit={(e)=>{ e.preventDefault(); if (pinCode === "1234") { setIsLocked(false); setPinCode(""); } else { alert("Chave incorreta! O PIN mestre padrão da sandbox é '1234'"); setPinCode(""); } }} className="space-y-4">
                    <input type="password" maxLength="4" autoFocus placeholder="Código PIN (padrão: 1234)" value={pinCode} onChange={(e)=>{ const c = e.target.value.replace(/\D/g, ""); setPinCode(c); if(c === "1234"){ setIsLocked(false); setPinCode(""); } }} className="w-full text-center tracking-[1.5em] text-white py-2.5 bg-white/5 border border-white/10 rounded-xl font-mono text-lg focus:outline-none focus:border-blue-500 font-bold" />
                    <div className="space-y-2 text-xs pt-1">
                      <button type="submit" className="w-full py-2.5 bg-blue-600 hover:bg-blue-700 font-bold rounded-xl text-xs transition-colors cursor-pointer">Confirmar Código PIN</button>
                      <button type="button" onClick={handleBiometrics} disabled={biometricsLoading} className="w-full py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-200 font-bold rounded-xl text-xs flex items-center justify-center gap-2 cursor-pointer">{biometricsLoading?'Analisando...':'Simular Touch ID / Biometria'}</button>
                    </div>
                  </form>
                  <p className="text-[10px] text-slate-500 font-mono">* Toda a custódia das chaves é armazenada localmente sem retenção remota.</p>
                </div>
              </div>
            )}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
